version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: viraamam_app
    environment:
      - FLASK_ENV=production
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped
    command: gunicorn -w 4 -k gevent --worker-connections 1000 -b 0.0.0.0:8000 wsgi:app

  redis:
    image: redis:7-alpine
    container_name: viraamam_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  nginx:
    image: nginx:alpine
    container_name: viraamam_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/static:/app/static:ro
    depends_on:
      - app
    restart: unless-stopped
