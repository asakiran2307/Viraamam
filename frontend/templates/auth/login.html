{% extends "base.html" %}
{% block title %}Login — Viraamam Cafe{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Viraama<span>m</span></h1>
      <p class="auth-subtitle">Welcome back ☕</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" novalidate id="login-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          type="email" id="email" name="email"
          class="form-control"
          placeholder="you@example.com"
          required autocomplete="email"
          value="{{ request.form.get('email', '') }}"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password" id="password" name="password"
          class="form-control"
          placeholder="••••••••"
          required autocomplete="current-password"
        />
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
        <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;cursor:pointer;">
          <input type="checkbox" name="remember" /> Remember me
        </label>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="login-submit-btn">
        Sign In
      </button>
    </form>

    <div class="auth-divider">or</div>

    <p style="text-align:center;font-size:0.9rem;color:var(--color-brown-600);">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" style="font-weight:600;">Create one</a>
    </p>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// Inline validation
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');

emailInput?.addEventListener('blur', () => {
  const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value);
  emailInput.classList.toggle('invalid', !valid && emailInput.value !== '');
});

passwordInput?.addEventListener('blur', () => {
  passwordInput.classList.toggle('invalid', passwordInput.value.length < 8);
});

document.getElementById('login-form')?.addEventListener('submit', function(e) {
  const btn = document.getElementById('login-submit-btn');
  if (btn) {
    btn.textContent = 'Signing in…';
    setTimeout(() => { btn.disabled = true; }, 50);
  }
});
</script>
{% endblock %}
